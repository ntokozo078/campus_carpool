{% extends 'base.html' %}

{% block content %}
<div class="page-header">
    <h2>Rate Your Driver</h2>
</div>

<div class="card" style="max-width: 600px; margin: 0 auto;">
    <p style="margin-bottom: 20px; color: var(--text-muted);">Please rate your recent trip to help maintain a safe and reliable community.</p>
    
    <form method="POST" action="{{ url_for('rate_driver') }}">
        <div class="form-group">
            <label>Driver:</label>
            <select name="driver_id" required>
                {% for driver in drivers %}
                <option value="{{ driver.user_id }}">{{ driver.name }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label>Rating (1-5 Stars):</label>
            <select name="rating" required>
                <option value="5">★★★★★ - Excellent</option>
                <option value="4">★★★★☆ - Good</option>
                <option value="3">★★★☆☆ - Average</option>
                <option value="2">★★☆☆☆ - Below Average</option>
                <option value="1">★☆☆☆☆ - Poor</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Comments (Optional):</label>
            <textarea name="comment" rows="4" placeholder="How was the ride?"></textarea>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn" style="width: 100%;">Submit Review</button>
        </div>
    </form>
</div>
{% endblock %}
