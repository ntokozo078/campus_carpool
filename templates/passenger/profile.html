{% extends 'base.html' %}

{% block content %}
<div class="page-header">
    <h2>My Profile</h2>
</div>

<div class="card" style="max-width: 500px; margin: 0 auto;">
    <form method="POST" action="{{ url_for('passenger_profile') }}">
        <div class="form-group">
            <label>Full Name:</label>
            <input type="text" name="name" value="{{ user.name }}" required>
        </div>
        
        <div class="form-group">
            <label>Email:</label>
            <input type="email" name="email" value="{{ user.email }}" readonly style="background-color: var(--border-color); color: var(--text-muted); cursor: not-allowed;">
        </div>
        
        <div class="form-group">
            <label>Phone Number:</label>
            <input type="tel" name="phone" value="{{ user.phone }}" required>
        </div>
        
        <div class="form-actions" style="margin-top: 25px;">
            <button type="submit" class="btn" style="width: 100%;">Update Profile</button>
        </div>
    </form>
</div>
{% endblock %}
