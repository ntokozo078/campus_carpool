{% extends 'base.html' %}

{% block content %}
<div class="page-header">
    <h2>Driver Profile</h2>
</div>

<div class="card" style="max-width: 600px; margin: 0 auto;">
    <form method="POST" action="#">
        <div class="form-group">
            <label>Full Name:</label>
            <input type="text" name="name" value="{{ user.name }}" required>
        </div>
        
        <div class="form-group">
            <label>Email Address:</label>
            <input type="email" name="email" value="{{ user.email }}" readonly style="background-color: var(--border-color); color: var(--text-muted); cursor: not-allowed;">
        </div>
        
        <div class="form-group">
            <label>Phone Number:</label>
            <input type="tel" name="phone" value="{{ user.phone }}" required>
        </div>
        
        <div class="form-group">
            <label>Student / Staff Number:</label>
            <input type="text" name="id_number" value="{{ user.student_number or user.staff_number }}" readonly style="background-color: var(--border-color); color: var(--text-muted); cursor: not-allowed;">
        </div>

        <div class="form-group">
            <label>Vehicle Details (Optional):</label>
            <input type="text" name="vehicle" value="{{ user.vehicle_details or '' }}" placeholder="e.g., White Toyota Polo - ND 123 456">
        </div>
        
        <div class="form-actions" style="margin-top: 25px;">
            <button type="submit" class="btn btn-dark" style="width: 100%;">Save Changes</button>
        </div>
    </form>
</div>
{% endblock %}
