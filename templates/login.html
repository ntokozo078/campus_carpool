{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 40px auto;">
    <div class="page-header" style="margin-bottom: 20px;">
        <h2>Welcome Back</h2>
        <p style="color: var(--text-muted); font-size: 0.9rem;">Sign in to your Campus Carpool account</p>
    </div>
    
    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="student@example.com">
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="••••••••">
        </div>
        
        <div class="form-actions" style="margin-top: 25px;">
            <button type="submit" class="btn" style="width: 100%;">Sign In</button>
        </div>
    </form>
    
    <div style="margin-top: 25px; text-align: center;">
        <p style="color: var(--text-muted); font-size: 0.9rem;">
            New to Campus Carpool? <br>
            <a href="{{ url_for('register') }}" style="font-weight: 600; display: inline-block; margin-top: 5px;">Create an Account</a>
        </p>
    </div>
</div>
{% endblock %}
